<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retool Custom Component Gallery</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Nunito', 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #3B7FF5;
            min-height: 100vh;
            padding: 32px 24px;
            color: #E5E7EB;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: #0E0E14;
            border-radius: 24px;
            padding: 40px;
            border: 3px solid #2DD4BF;
        }

        .header {
            text-align: center;
            margin-bottom: 50px;
        }

        .header-nav {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 12px;
            margin-bottom: 20px;
        }

        .header-nav-left {
            display: flex;
            flex-direction: column;
            gap: 8px;
            align-items: flex-start;
            flex-shrink: 0;
        }

        .header h1 {
            font-size: 3.2em;
            margin-bottom: 10px;
            font-weight: 900;
            color: #F5A623;
            letter-spacing: -0.01em;
            font-family: 'Nunito', sans-serif;
            text-shadow: 0 2px 0 rgba(0,0,0,0.35);
        }

        .header p {
            font-size: 1.1em;
            color: #CBD5E1;
        }

        .header-sub {
            font-size: 0.9em;
            color: #94A3B8;
            margin-top: 6px;
        }

        .search-box {
            width: 250px;
            flex-shrink: 0;
        }

        .search-box input {
            width: 100%;
            padding: 10px 16px;
            border: 1px solid #2DD4BF;
            border-radius: 10px;
            font-size: 0.9em;
            background: #1A1A22;
            color: #FFFFFF;
            font-family: inherit;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }

        .search-box input:focus {
            outline: none;
            border-color: #F5A623;
            box-shadow: 0 0 0 3px rgba(245,166,35,0.2);
        }

        .search-box input::placeholder {
            color: #6B7280;
        }

        .filters {
            background: transparent;
            padding: 0 0 24px 0;
            margin-bottom: 24px;
            border: none;
            border-bottom: 1px solid rgba(45,212,191,0.3);
        }

        .tag-filter {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .tag-button {
            padding: 8px 18px;
            border: 1.5px solid rgba(45,212,191,0.45);
            background: transparent;
            color: #94A3B8;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.9em;
            font-weight: 700;
            font-family: inherit;
            transition: all 0.2s ease;
        }

        .tag-button:hover {
            background: rgba(45,212,191,0.12);
            color: #2DD4BF;
            border-color: #2DD4BF;
        }

        .tag-button.active {
            background: #F5A623;
            color: #0E0E14;
            border-color: #F5A623;
            box-shadow: 0 2px 8px rgba(245,166,35,0.35);
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
            gap: 24px;
        }

        .component-card {
            background: #1A1A22;
            border-radius: 14px;
            overflow: hidden;
            border: 2px solid #2DD4BF;
            transition: transform 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
            display: flex;
            flex-direction: column;
        }

        .component-card:hover {
            transform: translateY(-5px);
            border-color: #F5A623;
            box-shadow: 0 8px 32px rgba(245,166,35,0.2);
        }

        .card-media {
            width: 100%;
            height: 240px;
            background: #0E0E14;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
            border-bottom: 2px solid #2DD4BF;
        }

        .card-media img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .card-content {
            padding: 24px;
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 12px;
            gap: 12px;
        }

        .card-header > div {
            min-width: 0;
        }

        .card-title {
            font-size: 1.35em;
            font-weight: 600;
            color: #FFFFFF;
            margin-bottom: 6px;
            letter-spacing: -0.01em;
            overflow-wrap: break-word;
        }

        .card-author {
            font-size: 0.9em;
            color: #CBD5E1;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .author-avatar {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: #F5A623;
            display: inline-block;
            flex-shrink: 0;
        }

        .github-link {
            padding: 7px 13px;
            background: rgba(45,212,191,0.1);
            color: #2DD4BF;
            text-decoration: none;
            border-radius: 8px;
            font-size: 0.85em;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: background 0.2s ease, color 0.2s ease;
            white-space: nowrap;
            border: 1px solid rgba(45,212,191,0.4);
            flex-shrink: 0;
            align-self: flex-start;
        }

        .github-link:hover {
            background: rgba(45,212,191,0.2);
            color: #FFFFFF;
            border-color: #2DD4BF;
        }

        .card-description {
            color: #FFFFFF;
            line-height: 1.6;
            margin-bottom: 16px;
            flex: 1;
            font-size: 0.95em;
        }

        .card-tags {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-top: auto;
        }

        .tag {
            padding: 5px 11px;
            background: rgba(45,212,191,0.1);
            color: #2DD4BF;
            border-radius: 20px;
            font-size: 0.82em;
            font-weight: 700;
            border: 1px solid rgba(45,212,191,0.35);
        }

        @media (max-width: 768px) {
            .header-nav {
                flex-direction: column;
                align-items: stretch;
            }

            .header-nav-left {
                align-items: stretch;
            }

            .search-box {
                width: 100%;
            }

            .gallery {
                grid-template-columns: 1fr;
            }

            .header h1 {
                font-size: 2em;
            }

            .card-header {
                flex-direction: column;
            }
        }

        /* ===== Champion Styles ===== */

        .champion-badge {
            display: inline-flex;
            align-items: center;
            gap: 3px;
            padding: 2px 9px;
            background: rgba(45,212,191,0.12);
            border: 1px solid rgba(45,212,191,0.5);
            border-radius: 10px;
            font-size: 0.72em;
            font-weight: 800;
            color: #2DD4BF;
            letter-spacing: 0.03em;
            white-space: nowrap;
        }

        .tag-button.champion-filter {
            border-color: rgba(245, 158, 11, 0.45);
            color: #F59E0B;
        }

        .tag-button.champion-filter:hover {
            background: rgba(245, 158, 11, 0.12);
            color: #F59E0B;
            border-color: #F59E0B;
        }

        .tag-button.champion-filter.active {
            background: #F59E0B;
            color: #1A1D1F;
            border-color: #F59E0B;
        }

        /* ===== Voting Styles ===== */

        .rank-badge {
            position: absolute;
            top: 12px;
            left: 12px;
            background: rgba(26, 29, 31, 0.88);
            border: 1px solid #374151;
            border-radius: 6px;
            padding: 4px 10px;
            font-size: 0.8em;
            font-weight: 700;
            color: #9CA3AF;
            backdrop-filter: blur(4px);
            z-index: 1;
            letter-spacing: 0.02em;
        }

        .rank-badge.gold   { border-color: #F59E0B; color: #F59E0B; }
        .rank-badge.silver { border-color: #9CA3AF; color: #C0C0C0; }
        .rank-badge.bronze { border-color: #B87333; color: #CD853F; }

        .star-btn {
            position: absolute;
            top: 12px;
            right: 12px;
            background: rgba(26, 29, 31, 0.88);
            border: 1px solid #374151;
            border-radius: 8px;
            padding: 8px 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 3px;
            cursor: pointer;
            transition: all 0.2s ease;
            backdrop-filter: blur(4px);
            z-index: 1;
            font-family: inherit;
            min-width: 46px;
        }

        .star-btn:hover:not(:disabled) {
            border-color: #F59E0B;
            background: rgba(245, 158, 11, 0.15);
        }

        .star-btn:hover:not(:disabled) .star-icon {
            color: #F59E0B;
        }

        .star-btn:hover:not(:disabled) .star-count {
            color: #F59E0B;
        }

        .star-btn.voted {
            border-color: #F59E0B;
            background: rgba(245, 158, 11, 0.15);
        }

        .star-btn.voted .star-icon {
            color: #F59E0B;
        }

        .star-btn.voted .star-count {
            color: #F59E0B;
        }

        .star-btn:disabled {
            cursor: not-allowed;
        }

        .star-btn:disabled:not(.voted) {
            opacity: 0.4;
        }

        .star-icon {
            font-size: 1.35em;
            line-height: 1;
            color: #6B7280;
            transition: color 0.2s ease;
        }

        .star-count {
            font-size: 0.75em;
            font-weight: 700;
            color: #9CA3AF;
            line-height: 1;
            transition: color 0.2s ease;
        }

        /* ===== Toast ===== */

        .toast {
            position: fixed;
            bottom: 32px;
            left: 50%;
            transform: translateX(-50%) translateY(80px);
            background: #141418;
            border: 2px solid #2DD4BF;
            color: #2DD4BF;
            padding: 12px 24px;
            border-radius: 10px;
            font-size: 0.925em;
            font-weight: 500;
            z-index: 3000;
            opacity: 0;
            transition: transform 0.3s ease, opacity 0.3s ease;
            pointer-events: none;
            white-space: nowrap;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        /* ===== Empty state ===== */

        .empty-state {
            grid-column: 1 / -1;
            text-align: center;
            color: #6B7280;
            padding: 60px 20px;
            font-size: 1em;
        }

        /* ===== Modal Styles ===== */

        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(8px);
            z-index: 1000;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
            animation: fadeIn 0.3s ease;
        }

        .modal-overlay.active {
            display: flex;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .modal-content {
            background: #141418;
            border-radius: 20px;
            max-width: 1000px;
            width: 100%;
            max-height: 90vh;
            overflow: hidden;
            border: 2px solid #2DD4BF;
            animation: slideUp 0.3s ease;
            position: relative;
        }

        .modal-scroll-inner {
            overflow-y: auto;
            max-height: 90vh;
            scrollbar-width: thin;
            scrollbar-color: #2DD4BF transparent;
        }

        .modal-scroll-inner::-webkit-scrollbar {
            width: 6px;
        }

        .modal-scroll-inner::-webkit-scrollbar-track {
            background: transparent;
            margin: 20px 0;
        }

        .modal-scroll-inner::-webkit-scrollbar-thumb {
            background: #2DD4BF;
            border-radius: 10px;
        }

        .modal-scroll-inner::-webkit-scrollbar-thumb:hover {
            background: #F5A623;
        }

        @keyframes slideUp {
            from { transform: translateY(30px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .modal-header {
            position: sticky;
            top: 0;
            background: #141418;
            border-bottom: 2px solid #2DD4BF;
            padding: 24px 32px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            z-index: 10;
        }

        .modal-close {
            background: transparent;
            border: none;
            color: #9CA3AF;
            font-size: 28px;
            cursor: pointer;
            padding: 0;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            transition: all 0.2s ease;
        }

        .modal-close:hover {
            background: #374151;
            color: #FFFFFF;
        }

        .modal-title-section {
            flex: 1;
        }

        .modal-title {
            font-size: 2em;
            font-weight: 600;
            color: #FFFFFF;
            margin-bottom: 12px;
            letter-spacing: -0.01em;
        }

        .modal-meta {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .modal-author {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .modal-author-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #F5A623;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #FFFFFF;
            font-weight: 600;
        }

        .modal-author-name {
            font-size: 1em;
            color: #E5E7EB;
            font-weight: 500;
        }

        .modal-body {
            padding: 32px;
        }

        .modal-preview {
            width: 100%;
            height: 400px;
            background: #1A1D1F;
            border-radius: 12px;
            overflow: hidden;
            margin-bottom: 32px;
            border: 1px solid #374151;
        }

        .modal-preview img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .modal-section {
            margin-bottom: 32px;
        }

        .modal-section h3 {
            font-size: 1.2em;
            color: #FFFFFF;
            margin-bottom: 12px;
            font-weight: 600;
        }

        .modal-section p {
            color: #D1D5DB;
            line-height: 1.7;
            font-size: 1em;
        }

        .modal-tags {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 24px;
        }

        .modal-tag {
            padding: 6px 14px;
            background: rgba(45,212,191,0.1);
            color: #2DD4BF;
            border-radius: 20px;
            font-size: 0.88em;
            font-weight: 700;
            border: 1px solid rgba(45,212,191,0.35);
        }

        .modal-actions {
            display: flex;
            gap: 12px;
            padding: 24px 32px;
            border-top: 2px solid #2DD4BF;
            position: sticky;
            bottom: 0;
            background: #141418;
        }

        .modal-btn {
            padding: 12px 24px;
            border-radius: 10px;
            font-size: 1em;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
        }

        .modal-btn.primary {
            background: #F5A623;
            color: #0E0E14;
            border: none;
            font-weight: 800;
            font-family: inherit;
        }

        .modal-btn.primary:hover {
            background: #E09218;
            transform: translateY(-2px);
            box-shadow: 0 4px 16px rgba(245,166,35,0.4);
        }

        .modal-btn.secondary {
            background: transparent;
            color: #2DD4BF;
            border: 1.5px solid #2DD4BF;
            font-weight: 700;
            font-family: inherit;
        }

        .modal-btn.secondary:hover {
            background: rgba(45,212,191,0.1);
        }

        @media (max-width: 768px) {
            .modal-content {
                max-height: 95vh;
            }

            .modal-header {
                padding: 20px;
            }

            .modal-body {
                padding: 24px 20px;
            }

            .modal-actions {
                padding: 20px;
                flex-direction: column;
            }
        }
        /* ===== Submit Button ===== */

        .submit-component-btn {
            padding: 10px 20px;
            background: #F5A623;
            color: #0E0E14;
            border: none;
            border-radius: 10px;
            font-size: 0.9em;
            font-weight: 800;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: background 0.2s ease, transform 0.2s ease, box-shadow 0.2s ease;
            font-family: inherit;
            white-space: nowrap;
        }

        .submit-component-btn:hover {
            background: #E09218;
            transform: translateY(-2px);
            box-shadow: 0 4px 14px rgba(245,166,35,0.4);
        }

        .edit-component-btn {
            padding: 10px 20px;
            background: transparent;
            color: #2DD4BF;
            border: 1.5px solid #2DD4BF;
            border-radius: 10px;
            font-size: 0.9em;
            font-weight: 800;
            cursor: pointer;
            display: none;
            align-items: center;
            gap: 8px;
            transition: background 0.2s ease, transform 0.2s ease, box-shadow 0.2s ease;
            font-family: inherit;
            white-space: nowrap;
        }

        .edit-component-btn:hover {
            background: rgba(45,212,191,0.12);
            transform: translateY(-2px);
            box-shadow: 0 4px 14px rgba(45,212,191,0.25);
        }

        /* ===== Feedback Banner (shown in edit mode when reviewer left notes) ===== */
        .prereq-banner {
            background: rgba(45, 212, 191, 0.07);
            border: 1.5px solid #2DD4BF;
            border-radius: 12px;
            padding: 18px 20px;
            margin-bottom: 28px;
        }
        .prereq-banner-title {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 800;
            color: #2DD4BF;
            font-size: 0.92em;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            margin-bottom: 10px;
        }
        .prereq-banner-body {
            color: #CBD5E1;
            font-size: 0.93em;
            line-height: 1.7;
        }
        .prereq-banner-body a {
            color: #2DD4BF;
            font-weight: 700;
            text-decoration: underline;
            text-underline-offset: 3px;
        }
        .prereq-banner-body a:hover { color: #F5A623; }
        .feedback-banner {
            background: rgba(245, 166, 35, 0.08);
            border: 1.5px solid #F5A623;
            border-radius: 12px;
            padding: 16px 20px;
            margin-bottom: 24px;
        }
        .feedback-banner-title {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 800;
            color: #F5A623;
            font-size: 0.92em;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            margin-bottom: 10px;
        }
        .feedback-banner-body {
            color: #CBD5E1;
            font-size: 0.92em;
            line-height: 1.65;
            white-space: pre-wrap;
        }

        /* ===== Submission Form Modal ===== */

        .submit-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.82);
            backdrop-filter: blur(8px);
            z-index: 1100;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .submit-overlay.active {
            display: flex;
        }

        .submit-modal {
            background: #141418;
            border-radius: 20px;
            max-width: 940px;
            width: 100%;
            max-height: 92vh;
            overflow-y: auto;
            border: 2px solid #2DD4BF;
            animation: slideUp 0.3s ease;
            display: flex;
            flex-direction: column;
            scrollbar-width: thin;
            scrollbar-color: #2DD4BF transparent;
        }

        .submit-modal::-webkit-scrollbar {
            width: 6px;
        }

        .submit-modal::-webkit-scrollbar-track {
            background: transparent;
            margin: 20px 0;
        }

        .submit-modal::-webkit-scrollbar-thumb {
            background: #2DD4BF;
            border-radius: 10px;
        }

        .submit-modal::-webkit-scrollbar-thumb:hover {
            background: #F5A623;
        }

        .submit-modal-header {
            position: sticky;
            top: 0;
            background: #141418;
            border-bottom: 2px solid #2DD4BF;
            padding: 22px 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
        }

        .submit-modal-header h2 {
            font-size: 1.4em;
            font-weight: 600;
            color: #FFFFFF;
            letter-spacing: -0.01em;
        }

        .submit-modal-body {
            padding: 28px 32px;
            flex: 1;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        .form-group {
            margin-bottom: 22px;
        }

        .form-label {
            display: block;
            font-size: 0.875em;
            font-weight: 600;
            color: #E5E7EB;
            margin-bottom: 7px;
        }

        .form-label .req { color: #EF4444; margin-left: 2px; }
        .form-label .opt { color: #6B7280; font-weight: 400; font-size: 0.9em; margin-left: 4px; }

        .form-input,
        .form-textarea {
            width: 100%;
            padding: 10px 14px;
            background: #1A1D1F;
            border: 1px solid #374151;
            border-radius: 8px;
            color: #FFFFFF;
            font-size: 0.925em;
            font-family: inherit;
            transition: border-color 0.2s ease;
        }

        .form-input:focus,
        .form-textarea:focus { outline: none; border-color: #2DD4BF; box-shadow: 0 0 0 3px rgba(45,212,191,0.15); }
        .form-input::placeholder,
        .form-textarea::placeholder { color: #4B5563; }
        .form-input.field-error,
        .form-textarea.field-error { border-color: #EF4444; }

        .form-textarea { resize: vertical; min-height: 96px; }

        .input-prefix-wrap {
            display: flex;
            align-items: stretch;
            background: #1A1D1F;
            border: 1px solid #374151;
            border-radius: 8px;
            overflow: hidden;
            transition: border-color 0.2s ease;
        }

        } catch (e) {

            try { localStorage.setItem('retoolGalleryVotes', JSON.stringify(votes)); } catch (e) {}
        }

        function getSessionVote() {
            return sessionStorage.getItem('retoolGallerySessionVote');
        }

        function castVote(event, componentId) {
            event.stopPropagation();

            const previousVote = getSessionVote();
            if (previousVote === componentId) return; // already on this one

            // Remove vote from previous card
            if (previousVote) {
                votes[previousVote] = Math.max(0, (votes[previousVote] || 0) - 1);
            }

            // Add vote to new card
            votes[componentId] = (votes[componentId] || 0) + 1;

            saveVotes();
            sessionStorage.setItem('retoolGallerySessionVote', componentId);

            renderGallery();
            showToast(previousVote ? 'Vote switched!' : 'Your vote has been cast!');
        }

            let list = [...components];

            if (currentFilter === '★ Community Champions') {
                list = list.filter(c => champions.has(c.author));
            } else if (currentFilter !== 'All Components') {
                const allowed = filterTagMap[currentFilter] || [];
                list = list.filter(c => c.tags.some(t => allowed.includes(t.name)));
            }

            if (currentSearch.trim()) {
                const q = currentSearch.trim().toLowerCase();
                list = list.filter(c =>
                    c.title.toLowerCase().includes(q) ||
                    c.shortDescription.toLowerCase().includes(q) ||
                    c.author.toLowerCase().includes(q) ||
                    c.tags.some(t => t.name.toLowerCase().includes(q))
                );
            }

            // Sort by votes descending (ties keep original order)
            list.sort((a, b) => (votes[b.id] || 0) - (votes[a.id] || 0));
            return list;

        function _getEmbedUrl(url) {
            if (!url) return null;
            // YouTube: watch?v=, youtu.be/, shorts/
            const yt = url.match(/(?:youtube\.com\/(?:watch\?v=|shorts\/)|youtu\.be\/)([A-Za-z0-9_-]{11})/);
            if (yt) return 'https://www.youtube.com/embed/' + yt[1];
            // Vimeo

            if (vm) return 'https://player.vimeo.com/video/' + vm[1];
            return null;
        }

        function addFiles(fileList) {
            const file = Array.from(fileList).find(f => f.type.startsWith('image/'));
            if (!file) return;
            const reader = new FileReader();
            reader.onload = e => {
                uploadedFiles = [{ file, dataUrl: e.target.result }];
                renderFileGrid();
            };
            reader.readAsDataURL(file);
        }

        function renderFileGrid() {
            const grid = document.getElementById('sf-file-grid');
            const zone = document.getElementById('sf-file-zone');

            dropText.innerHTML = uploadedFiles.length > 0
                ? `<strong>Replace cover</strong> or drag and drop`

                <div class="file-thumb">

                        onclick="removeFile(${i})" title="Remove">&#10005;</button>

        // ===== Block Editor =====

        let _wedDrag = null;

        function initWed(editorId) {
            const area = document.getElementById(editorId + '-area');
            if (!area || area.children.length > 0) return;
            const block = _wedMakeText(editorId, '');
            area.appendChild(block);
            // Click empty area → focus last text block or add one
            area.addEventListener('click', e => {
                if (e.target !== area) return;
                const last = [...area.querySelectorAll('.wed-text')].pop();
                if (last) { last.focus(); _wedCursorEnd(last); }
                else { const b = _wedMakeText(editorId, ''); area.appendChild(b); b.querySelector('.wed-text').focus(); }
            });
        }

        function _wedMakeText(editorId, html) {
            const block = _wedBlock(editorId);
            const div = document.createElement('div');
            div.className = 'wed-text';
            div.contentEditable = 'true';
            div.dataset.placeholder = 'Start typing…';
            if (html) div.innerHTML = html;
            div.addEventListener('keydown', e => {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    // Split content at caret
                    const sel = window.getSelection();
                    if (sel.rangeCount) {
                        const range = sel.getRangeAt(0);
                        const after = range.cloneRange();
                        after.selectNodeContents(div);
                        after.setStart(range.endContainer, range.endOffset);
                        const frag = after.cloneContents();
                        after.deleteContents();
                        const nb = _wedMakeText(editorId, '');
                        const nt = nb.querySelector('.wed-text');
                        nt.appendChild(frag);
                        block.after(nb);
                        nt.focus();
                        _wedCursorStart(nt);
                    }
                }
                if (e.key === 'Backspace') {
                    const area = block.parentElement;
                    if (!div.textContent && area && area.querySelectorAll('.wed-block').length > 1) {
                        e.preventDefault();
                        const prev = block.previousElementSibling;
                        block.remove();
                        const target = prev || area.lastElementChild;
                        const t = target?.querySelector('.wed-text');
                        if (t) { t.focus(); _wedCursorEnd(t); }
                    }
                }
            });
            block.querySelector('.wed-block-inner').appendChild(div);
            return block;
        }

        function _wedMakeCode(editorId) {
            const block = _wedBlock(editorId);
            const wrap = document.createElement('div');
            wrap.className = 'wed-code-block';
            const hdr = document.createElement('div');
            hdr.className = 'wed-code-header';
            const lbl = document.createElement('span');
            lbl.className = 'wed-code-lang';
            lbl.textContent = 'code';
            const rm = document.createElement('button');
            rm.type = 'button'; rm.className = 'wed-code-rm'; rm.innerHTML = '&#10005;'; rm.title = 'Remove';
            rm.onclick = () => {
                const area = block.parentElement;
                if (area && area.querySelectorAll('.wed-block').length === 1) {
                    const nb = _wedMakeText(editorId, '');
                    block.after(nb);
                }
                block.remove();
            };
            hdr.appendChild(lbl); hdr.appendChild(rm);
            const code = document.createElement('div');
            code.className = 'wed-code-input';
            code.contentEditable = 'true';
            code.spellcheck = false;
            code.addEventListener('keydown', e => {
                if (e.key === 'Tab') { e.preventDefault(); document.execCommand('insertText', false, '    '); }
                if (e.key === 'Escape') {
                    const next = block.nextElementSibling;
                    const t = next?.querySelector('.wed-text');
                    if (t) { t.focus(); _wedCursorStart(t); }
                    else {
                        const nb = _wedMakeText(editorId, '');
                        block.after(nb);
                        nb.querySelector('.wed-text').focus();
                    }
                }
            });
            wrap.appendChild(hdr); wrap.appendChild(code);
            block.querySelector('.wed-block-inner').appendChild(wrap);
            return block;
        }

        function _wedMakeImage(editorId, src) {
            const block = _wedBlock(editorId);
            const wrap = document.createElement('div');
            wrap.className = 'wed-img-block';
            const img = document.createElement('img');
            img.src = src; img.alt = ''; img.draggable = false;
            const rm = document.createElement('button');
            rm.type = 'button'; rm.className = 'wed-img-rm'; rm.innerHTML = '&#10005;'; rm.title = 'Remove';
            rm.onclick = () => block.remove();
            wrap.appendChild(img);
            block.querySelector('.wed-block-inner').appendChild(wrap);
            block.appendChild(rm);
            return block;
        }

        function _wedBlock(editorId) {
            const block = document.createElement('div');
            block.className = 'wed-block';
            const handle = document.createElement('span');
            handle.className = 'wed-drag';
            handle.innerHTML = '&#9646;&#9646;';
            handle.title = 'Drag to reorder';
            handle.addEventListener('mousedown', () => { block.draggable = true; });
            const inner = document.createElement('div');
            inner.className = 'wed-block-inner';
            block.appendChild(handle);
            block.appendChild(inner);
            block.addEventListener('dragstart', _wedDragStart);
            block.addEventListener('dragend',   _wedDragEnd);
            block.addEventListener('dragover',  _wedDragOver);
            block.addEventListener('dragleave', _wedDragLeave);
            block.addEventListener('drop',      _wedDrop);
            return block;
        }

        function _wedDragStart(e) {
            _wedDrag = this; this.classList.add('wed-dragging');
            e.dataTransfer.effectAllowed = 'move'; e.dataTransfer.setData('text/plain', '');
        }
        function _wedDragEnd() {
            this.draggable = false; this.classList.remove('wed-dragging');
            document.querySelectorAll('.wed-block').forEach(b => b.classList.remove('wed-over-top','wed-over-bot'));
            _wedDrag = null;
        }
        function _wedDragOver(e) {
            if (!_wedDrag || _wedDrag === this) return;
            e.preventDefault(); e.dataTransfer.dropEffect = 'move';
            const mid = this.getBoundingClientRect().top + this.offsetHeight / 2;
            this.classList.toggle('wed-over-top', e.clientY < mid);
            this.classList.toggle('wed-over-bot', e.clientY >= mid);
        }
        function _wedDragLeave() { this.classList.remove('wed-over-top','wed-over-bot'); }
        function _wedDrop(e) {
            e.preventDefault();
            if (!_wedDrag || _wedDrag === this) return;
            const mid = this.getBoundingClientRect().top + this.offsetHeight / 2;
            if (e.clientY < mid) this.parentNode.insertBefore(_wedDrag, this);
            else this.parentNode.insertBefore(_wedDrag, this.nextSibling);
            this.classList.remove('wed-over-top','wed-over-bot');
        }

        function wedInsertCode(editorId) {
            const area = document.getElementById(editorId + '-area');
            const focusedBlock = document.activeElement?.closest?.('.wed-block');
            const block = _wedMakeCode(editorId);
            if (focusedBlock && focusedBlock.parentElement === area) focusedBlock.after(block);
            else area.appendChild(block);
            block.querySelector('.wed-code-input').focus();
            // Empty text block after for continuation
            const nb = _wedMakeText(editorId, '');
            block.after(nb);
        }

        function wedInsertImage(input, editorId) {
            const area = document.getElementById(editorId + '-area');
            const focusedBlock = document.activeElement?.closest?.('.wed-block');
            Array.from(input.files).filter(f => f.type.startsWith('image/')).forEach(file => {
                const reader = new FileReader();
                reader.onload = ev => {
                    const block = _wedMakeImage(editorId, ev.target.result);
                    if (focusedBlock && focusedBlock.parentElement === area) focusedBlock.after(block);
                    else area.appendChild(block);
                    const nb = _wedMakeText(editorId, '');
                    block.after(nb);
                };
                reader.readAsDataURL(file);
            });
            input.value = '';
        }

        function _wedCursorEnd(el) {
            const r = document.createRange(), s = window.getSelection();
            r.selectNodeContents(el); r.collapse(false);
            s.removeAllRanges(); s.addRange(r);
        }
        function _wedCursorStart(el) {
            const r = document.createRange(), s = window.getSelection();
            r.setStart(el, 0); r.collapse(true);
            s.removeAllRanges(); s.addRange(r);
        }

        function isWedEmpty(editorId) {
            const area = document.getElementById(editorId + '-area');
            if (!area) return true;
            // In edit mode, area may contain raw HTML without .wed-block wrappers
            if (!area.querySelector('.wed-block')) {
                return area.textContent.trim() === '' && !area.querySelector('img');
            }
            for (const block of area.querySelectorAll('.wed-block')) {
                if (block.querySelector('img')) return false;
                const code = block.querySelector('.wed-code-input');
                if (code && code.textContent.trim()) return false;
                const text = block.querySelector('.wed-text');
                if (text && text.textContent.trim()) return false;
            }
            return true;
        }

        function getWedHTML(editorId) {
            const area = document.getElementById(editorId + '-area');
            if (!area) return '';
            // In edit mode, area may contain raw pre-filled HTML — return it directly
            if (!area.querySelector('.wed-block')) return area.innerHTML;
            let html = '';
            for (const block of area.querySelectorAll('.wed-block')) {
                const text = block.querySelector('.wed-text');
                const code = block.querySelector('.wed-code-input');
                const img  = block.querySelector('img');
                if (text) {
                    html += '<p style="margin:0 0 .6em;color:#F1F5F9;line-height:1.72;">' + text.innerHTML + '</p>';
                } else if (code) {
                    html += '<pre style="background:#090B0D;border:1px solid #1C1F26;border-radius:8px;'
                          + 'padding:12px 16px;margin:8px 0;overflow-x:auto;">'
                          + '<code style="font-family:monospace;color:#F5A623;font-size:.88em;">'
                          + esc(code.textContent) + '</code></pre>';
                } else if (img) {
                    html += '<img src="' + img.src + '" style="max-width:100%;border-radius:8px;display:block;margin:8px 0;">';
                }
            }
            return html;
        }

        // ===== Token Generation =====

        function generateToken() {
            if (typeof crypto !== 'undefined' && crypto.randomUUID) return crypto.randomUUID();
            return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, c => {
                const r = Math.random() * 16 | 0;
                return (c === 'x' ? r : (r & 0x3 | 0x8)).toString(16);
            });
        }

        // ===== Edit Mode Init (runs on page load if ?edit=TOKEN in URL) =====

        async function initEditMode() {
            const token = new URLSearchParams(window.location.search).get('edit');
            if (!token) return;

            console.log('[EditMode] Token found:', token);

            const WORKFLOW_ID  = '109e8eb2-507b-4573-9ab3-fce34a58107f';
            const WORKFLOW_KEY = 'retool_wk_490325bf5e0648f38ad4c807f1537351';

            try {
                // Step 1: trigger the workflow
                const res  = await fetch(VALIDATE_WEBHOOK, {
                    method:  'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body:    JSON.stringify({ token })
                });
                const json = await res.json();
                console.log('[EditMode] Trigger response:', JSON.stringify(json));

                if (!res.ok) { console.warn('[EditMode] Trigger HTTP error:', res.status); return; }

                const runId = json.workflow_run?.id;
                if (!runId) { console.warn('[EditMode] No run ID'); return; }

                // Step 2: poll for run completion (async workflow returns PENDING)
                let rowData = null;
                for (let i = 0; i < 10; i++) {
                    await new Promise(r => setTimeout(r, 700));
                    const pollRes = await fetch(
                        `https://api.retool.com/v1/workflows/${WORKFLOW_ID}/runs/${runId}?workflowApiKey=${WORKFLOW_KEY}`
                    );
                    const poll = await pollRes.json();
                    console.log(`[EditMode] Poll ${i + 1}: status=${poll?.workflow_run?.status}`, JSON.stringify(poll));

                    if (poll.workflow_run?.status === 'COMPLETED') {
                        // Try all known locations where Retool may put the output
                        rowData = poll.workflow_run?.data
                               ?? poll.workflow_run?.output
                               ?? poll.workflow_run?.result
                               ?? poll.data;
                        break;
                    }
                    if (poll.workflow_run?.status === 'FAILED') {
                        console.warn('[EditMode] Workflow run failed'); break;
                    }
                }

                if (!rowData) { console.warn('[EditMode] No row data after polling'); return; }
                console.log('[EditMode] Row data:', JSON.stringify(rowData));

                // Handle possible nesting: { data: { project_name } } or { project_name } directly
                const submission = (rowData && typeof rowData === 'object' && rowData.data) ? rowData.data : rowData;
                if (!submission?.project_name) {
                    console.warn('[EditMode] project_name missing from submission:', JSON.stringify(submission)); return;
                }

                editToken = token;
                editData  = submission;
                editMode  = false;

                // Attach reviewer feedback if present in the URL (?feedback=...)
                const feedbackParam = new URLSearchParams(window.location.search).get('feedback');
                if (feedbackParam) editData.feedback = feedbackParam;

                const btn = document.getElementById('edit-component-btn');
                btn.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04c.39-.39.39-1.02 0-1.41l-2.34-2.34c-.39-.39-1.02-.39-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/></svg> Edit: ${esc(editData.project_name)}`;
                btn.style.display = 'flex';
                console.log('[EditMode] Button shown for:', editData.project_name);

                // Auto-open the form immediately when arriving via email link
                openEditModal();
            } catch (e) {
                console.error('[EditMode] Error:', e);
            }
        }

        // ===== Open Edit Modal (pre-fills form with existing submission data) =====

        function openEditModal() {
            editMode = true;
            buildSubmitModal();

            // Pre-fill simple fields
            document.getElementById('sf-name').value    = editData.name         || '';
            document.getElementById('sf-username').value = editData.username    || '';
            document.getElementById('sf-email').value   = editData.email        || '';
            document.getElementById('sf-project').value = editData.project_name || '';
            document.getElementById('sf-repo').value    = editData.repo_link    || '';
            document.getElementById('sf-about').value   = editData.about        || '';
            document.getElementById('sf-video').value   = editData.video_url    || '';
            updateCharCounter('sf-project', 'sf-project-counter', 50);
            updateCharCounter('sf-about',   'sf-about-counter',   100);

            // Pre-fill rich text areas with stored HTML
            const howArea  = document.getElementById('sf-how-area');
            const procArea = document.getElementById('sf-process-area');
            if (howArea  && editData.how_it_works)  howArea.innerHTML  = editData.how_it_works;
            if (procArea && editData.build_process) procArea.innerHTML = editData.build_process;

            // Pre-select tags
            selectedTags = (editData.tags || '').split(',').map(t => t.trim()).filter(Boolean);
            document.querySelectorAll('.tag-pick-btn').forEach(btn => {
                if (selectedTags.includes(btn.textContent.trim())) btn.classList.add('selected');
            });

            // Update modal labels for edit mode
            document.getElementById('submitModalTitle').textContent = 'Edit Your Component';
            document.querySelector('#footerFormBtns .modal-btn.primary').textContent = 'Preview Changes \u2192';

            // Inject reviewer feedback banner at the top of the form if present
            if (editData.feedback) {
                const banner = document.createElement('div');
                banner.className = 'feedback-banner';
                banner.innerHTML = `
                    <div class="feedback-banner-title">
                        <svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/></svg>
                        Reviewer Feedback
                    </div>
                    <div class="feedback-banner-body">${esc(editData.feedback)}</div>
                `;
                const formBody = document.getElementById('submitFormBody');
                formBody.insertBefore(banner, formBody.firstChild);
            }

            document.getElementById('submitOverlay').classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        async function confirmSubmit() {
            const SUBMIT_WEBHOOK = 'https://api.retool.com/v1/workflows/887d5fd1-f8e1-4f92-800a-8ff7a28bc622/startTrigger?workflowApiKey=retool_wk_7c33407d2ef541cb904fb7f021ffffe2';
            const endpoint = editMode ? UPDATE_WEBHOOK : SUBMIT_WEBHOOK;

            const submitBtn = document.querySelector('#footerPreviewBtns .modal-btn.primary');
            const originalText = submitBtn.textContent;
            submitBtn.disabled = true;
            submitBtn.textContent = editMode ? 'Saving…' : 'Submitting…';

            // On new submissions generate a fresh token; on edits use the existing one
            const token = editMode ? editToken : generateToken();

            // Cover image: use new upload if provided, otherwise keep existing URL
            const coverImage = uploadedFiles.length > 0
                ? uploadedFiles[0].dataUrl
                : (editMode ? editData.cover_image : '');

            const payload = {
                edit_token:    token,
                name:          document.getElementById('sf-name').value.trim(),
                username:      document.getElementById('sf-username').value.trim(),
                email:         document.getElementById('sf-email').value.trim(),
                project_name:  document.getElementById('sf-project').value.trim(),
                repo_link:     document.getElementById('sf-repo').value.trim(),
                about:         document.getElementById('sf-about').value.trim(),
                how_it_works:  getWedHTML('sf-how'),
                build_process: getWedHTML('sf-process'),
                video_url:     document.getElementById('sf-video').value.trim(),
                cover_image:   coverImage,
                tags:          selectedTags.join(', ')
            };

            try {
                const res = await fetch(endpoint, {
                    method:  'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body:    JSON.stringify(payload)
                });
                const json = await res.json();
                if (!res.ok || json?.error?.error) {
                    throw new Error(json?.error?.message || 'HTTP ' + res.status);
                }
            } catch (err) {
                submitBtn.disabled = false;
                submitBtn.textContent = originalText;
                alert((editMode ? 'Update' : 'Submission') + ' failed:\n\n' + err.message);
                return;
            }

            const successEl = document.getElementById('submitSuccess');
            if (editMode) {
                successEl.querySelector('h3').textContent = 'Changes submitted!';
                successEl.querySelector('p').textContent  = 'Your updates are under review. We\'ll apply them to your component shortly.';
            }
            document.getElementById('submitPreviewBody').style.display = 'none';
            document.getElementById('submitFooter').style.display = 'none';
            successEl.classList.add('visible');
            selectedTags = [];
            uploadedFiles = [];
        }
    </script>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="header-nav">
                <div class="header-nav-left">
                    <button class="submit-component-btn" onclick="openSubmitModal()">
                        <svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
                        Submit Component
                    </button>
                    <button class="edit-component-btn" id="edit-component-btn" onclick="openEditModal()">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04c.39-.39.39-1.02 0-1.41l-2.34-2.34c-.39-.39-1.02-.39-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/></svg>
                        Edit My Component
                    </button>
                </div>
                <div class="search-box">
                    <input type="text" placeholder="Search components...">
                </div>
            </div>
            <h1>Custom Component Gallery</h1>
            <p>Community-built components for Retool</p>
            <p class="header-sub">Ranked by community votes &mdash; one vote per session</p>
        </div>

        <div class="filters">
            <div class="tag-filter">
                <button class="tag-button active">All Components</button>
                <button class="tag-button champion-filter">&#9733; Community Champions</button>
                <button class="tag-button">AI & Agents</button>
                <button class="tag-button">Charts & Maps</button>
                <button class="tag-button">Data & Files</button>
                <button class="tag-button">Editors</button>
                <button class="tag-button">UI & Layout</button>
            </div>
        </div>

        <div id="gallery" class="gallery"></div>
    </div>

    <!-- Component Detail Modal -->
    <div class="modal-overlay" id="componentModal">
        <div class="modal-content">
            <div class="modal-scroll-inner">
            <div class="modal-header">
                <div class="modal-title-section">
                    <h2 class="modal-title" id="modalTitle">Component Title</h2>
                    <div class="modal-meta">
                        <div class="modal-author">
                            <div class="modal-author-avatar" id="modalAuthorAvatar">AT</div>
                            <span class="modal-author-name" id="modalAuthorName">@author</span>
                        </div>
                    </div>
                </div>
                <button class="modal-close" onclick="closeModal()">&times;</button>
            </div>

            <div class="modal-body">
                <div class="modal-preview">
                    <img id="modalPreview" src="" alt="Component preview">
                </div>
                <div class="modal-section">
                    <h3>About this component</h3>
                    <p id="modalDescription"></p>
                </div>
                <div class="modal-section">
                    <h3>Tags</h3>
                    <div class="modal-tags" id="modalTags"></div>
                </div>
            </div>

            <div class="modal-actions">
                <a href="#" class="modal-btn primary" id="modalRepoLink" target="_blank">
                    <svg width="20" height="20" viewBox="0 0 16 16" fill="currentColor">
                        <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/>
                    </svg>
                    View on GitHub
                </a>
                <button class="modal-btn secondary" onclick="closeModal()">Close</button>
            </div>
            </div>
        </div>
    </div>

    <!-- Submission Form Modal -->
    <div class="submit-overlay" id="submitOverlay"></div>

    <!-- Toast notification -->
    <div id="toast" class="toast"></div>
</body>
</html>
